<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contato</title>
</head>
<body>
    <header>
        <h1>Nosso contato</h1>
    </header>

    <section class="contato">
        <h2>Mande sua mensagem para nosso time!</h2><br>
        <form>
            <fieldset>
            <legend>Entre em contato conosco</legend><br>

                <label for="name">Nome:</label>
                <input type="text" id="name" name="name"><br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email"><br>
                <label for="mensage">Mensagem:</label><br>
                <textarea id="mensage" name="mensage" rows="4" cols="50" placeholder="Digite sua mensagem aqui"></textarea><br>
                <button>Envie a mensagem</button>
            </fieldset>
        </form>
    </section>
    <footer>
        <a href="index.html">Voltar ao inicio</a><br><br>

        <p>&copy; 2026 Blog de Viagens. Todos os direitos reservados.</p>
    </footer>
    
</body>
</html>
